
name: PowerBI Deployment Pipeline

on:
    workflow_dispatch:
      inputs:
        deploy_scope:
          description: 'Deployment scope (All = everything, Selective = specific items)'
          required: true
          default: 'All'
          type: choice
          options:
            - All
            - Selective
        item_names:
          description: 'Items to deploy (comma-separated names, supports wildcards e.g. "Demo Report,demo_semantic*"). Used only when Selective.'
          required: false
          type: string
          default: ''
        include_dependents:
          description: 'Include related/dependent items (e.g. Semantic Model for a Report)'
          required: false
          type: boolean
          default: true

permissions:
  contents: read

env:
  POWERBI_PIPELINE_NAME: 'PowerBI Deployment'   # exact display name in PowerBI
  DEV_WORKSPACE_ID: ''   # Dev workspace ID (GUID) - leave empty to look up by name
  DEV_WORKSPACE_NAME: 'PowerBI-DEV'   # Dev workspace name (used if ID is empty)
  DEV_STAGE_NAME: 'Development'
  TEST_STAGE_NAME: 'Test'
  PROD_STAGE_NAME: 'Production'
  FABRIC_RESOURCE: 'https://api.fabric.microsoft.com'
  # Optional: set DEBUG to 1 in GitHub Actions env/vars to enable verbose logs
  DEBUG: '0'
  AZURE_CREDENTIALS: >-
    {"clientId":"${{ secrets.PowerBI_CLIENT_ID }}","clientSecret":"${{ secrets.PowerBI_CLIENT_SECRET }}","tenantId":"${{ secrets.PowerBI_TENANT_ID }}","subscriptionId":"${{ secrets.PowerBI_SUBSCRIPTION_ID }}"}

jobs:
  test:
    name: Promote to Test
    runs-on: ubuntu-latest
    environment: PowerBI-Test
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: "PowerBI deploy: Development → Test (PowerShell)"
        shell: pwsh
        run: |
          # ============================================================================
          # Script: Deploy from Development to Test
          # Purpose: Promotes PowerBI artifacts from Dev stage to Test stage using
          #          PowerBI Deployment Pipeline API with status polling
          # ============================================================================
          
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'

          # Helper functions for logging and error handling
          function Log([string]$m){ Write-Host "[$(Get-Date -Format o)] $m" }
          function Fail([string]$m){ Write-Error $m; exit 1 }

          # Acquire access token for Fabric API
          $fabricResource = "${{ env.FABRIC_RESOURCE }}"
          $token = az account get-access-token --resource $fabricResource --query accessToken -o tsv 2>&1
          if ([string]::IsNullOrWhiteSpace($token)){ Fail "Failed to acquire Fabric token." }

          function Invoke-AzRestJson([string]$Method,[string]$Uri,[string]$BodyJson){
            $headers = @("Authorization=Bearer $token","Content-Type=application/json")
            $cliArgs = @('rest', '--method', $Method, '--uri', $Uri, '--headers') + $headers
            if ($BodyJson){ $tmp = New-TemporaryFile; $BodyJson | Out-File -Encoding utf8 -FilePath $tmp; $cliArgs += @('--body', "@$tmp") }

            $psi = New-Object System.Diagnostics.ProcessStartInfo
            $psi.FileName = "az"
            $psi.RedirectStandardError = $true
            $psi.RedirectStandardOutput = $true
            $psi.UseShellExecute = $false
            foreach ($arg in $cliArgs) { $psi.ArgumentList.Add($arg) }

            $p = [System.Diagnostics.Process]::Start($psi)
            $out = $p.StandardOutput.ReadToEnd()
            $err = $p.StandardError.ReadToEnd()
            $p.WaitForExit()

            $status = ($err -split "`n" | Select-String -Pattern 'Status Code:\s*(\d+)' | ForEach-Object { $_.Matches[0].Groups[1].Value } | Select-Object -Last 1)
            [pscustomobject]@{ Status=$status; ExitCode=$p.ExitCode; OutJson=$out; ErrText=$err }
          }

          # ============================================================================
          # STEP 1: Discover Pipeline and Stage Configuration
          # Re-discovers pipeline and stage IDs (not passed between jobs)
          # ============================================================================
          Log "Discovering PowerBI pipeline and stage IDs..."
          $r = Invoke-AzRestJson -Method GET -Uri "$fabricResource/v1/deploymentPipelines"
          if ($r.ExitCode -ne 0){ $r.ErrText | Out-Host; Fail "Failed listing pipelines" }
          $pipelines = ($r.OutJson | ConvertFrom-Json).value

          $pipelineName = "${{ env.POWERBI_PIPELINE_NAME }}"
          $pipeline = $pipelines | Where-Object { $_.displayName -eq $pipelineName } | Select-Object -First 1
          if (-not $pipeline){ Fail "Pipeline '$pipelineName' not found" }
          $pipelineId = $pipeline.id

          $r2 = Invoke-AzRestJson -Method GET -Uri "$fabricResource/v1/deploymentPipelines/$pipelineId/stages"
          if ($r2.ExitCode -ne 0){ $r2.ErrText | Out-Host; Fail "Failed listing stages" }
          $stages = ($r2.OutJson | ConvertFrom-Json).value

          $devId  = ($stages | Where-Object { $_.displayName -eq "${{ env.DEV_STAGE_NAME }}"  } | Select-Object -ExpandProperty id -First 1)
          $testId = ($stages | Where-Object { $_.displayName -eq "${{ env.TEST_STAGE_NAME }}" } | Select-Object -ExpandProperty id -First 1)

          if (-not $devId -or -not $testId){ Fail "Could not resolve source/target stage IDs" }
          Log "Pipeline: $pipelineId, Dev: $devId, Test: $testId"

          # ============================================================================
          # STEP 2: Build deployment request (All or Selective)
          # ============================================================================
          $deployUri = "$fabricResource/v1/deploymentPipelines/$pipelineId/deploy"
          $deployScope = '${{ inputs.deploy_scope }}'

          if ($deployScope -eq 'Selective') {
            $itemNamesInput = '${{ inputs.item_names }}'
            $includeDependents = '${{ inputs.include_dependents }}' -eq 'true'

            if ([string]::IsNullOrWhiteSpace($itemNamesInput)) {
              Fail "Selective deployment requires at least one item name in 'item_names' input."
            }

            # List items in the source (Development) stage
            Log "Listing items in Development stage..."
            $itemsResp = Invoke-AzRestJson -Method GET -Uri "$fabricResource/v1/deploymentPipelines/$pipelineId/stages/$devId/items"
            if ($itemsResp.ExitCode -ne 0){ $itemsResp.ErrText | Out-Host; Fail "Failed to list stage items" }
            $stageItems = ($itemsResp.OutJson | ConvertFrom-Json).value

            Log "Available items in stage ($($stageItems.Count)):"
            $stageItems | ForEach-Object { Log "  - $($_.itemDisplayName) ($($_.itemType))" }

            # Parse requested names (comma-separated, supports wildcards)
            $requestedNames = $itemNamesInput -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }

            # Match items by display name (wildcard support via -like)
            $matchedItems = @($stageItems | Where-Object {
              $item = $_
              $requestedNames | Where-Object { $item.itemDisplayName -like $_ }
            })

            if ($matchedItems.Count -eq 0) {
              Fail "No items matched the provided names: $itemNamesInput"
            }

            # Optionally include dependent/related items
            if ($includeDependents) {
              $matchedIds = [System.Collections.Generic.HashSet[string]]::new()
              $matchedItems | ForEach-Object { $matchedIds.Add($_.itemId) | Out-Null }
              $selectedTypes = $matchedItems | Select-Object -ExpandProperty itemType -Unique
              $dependentItems = @()

              # Reports depend on Semantic Models
              if ($selectedTypes -contains 'Report') {
                $dependentItems += @($stageItems | Where-Object { $_.itemType -eq 'SemanticModel' -and -not $matchedIds.Contains($_.itemId) })
              }
              # Dashboards depend on Reports and Semantic Models
              if ($selectedTypes -contains 'Dashboard') {
                $dependentItems += @($stageItems | Where-Object { $_.itemType -in @('Report','SemanticModel') -and -not $matchedIds.Contains($_.itemId) })
              }
              # Semantic Models may depend on data sources
              if ($selectedTypes -contains 'SemanticModel') {
                $dependentItems += @($stageItems | Where-Object { $_.itemType -in @('Lakehouse','SQLDatabase','Warehouse') -and -not $matchedIds.Contains($_.itemId) })
              }

              if ($dependentItems.Count -gt 0) {
                # Deduplicate
                $dependentItems = $dependentItems | Sort-Object -Property itemId -Unique
                Log "Including $($dependentItems.Count) dependent item(s):"
                $dependentItems | ForEach-Object { Log "  + $($_.itemDisplayName) ($($_.itemType))" }
                $matchedItems = @($matchedItems) + @($dependentItems)
              }
            }

            Log "Deploying $($matchedItems.Count) item(s):"
            $matchedItems | ForEach-Object { Log "  -> $($_.itemDisplayName) ($($_.itemType))" }

            $deployItems = @($matchedItems | ForEach-Object {
              @{ sourceItemId = $_.itemId; itemType = $_.itemType }
            })

            $body = @{
              sourceStageId = $devId
              targetStageId = $testId
              items         = $deployItems
              note          = "GH Dev->Test (selective)"
            } | ConvertTo-Json -Depth 5
          }
          else {
            $body = @{
              sourceStageId = $devId
              targetStageId = $testId
              note          = "GH Dev->Test"
            } | ConvertTo-Json -Depth 5
          }

          try {
            $resp = Invoke-WebRequest -Method Post -Uri $deployUri -Headers @{ Authorization = "Bearer $token"; 'Content-Type'='application/json'} -Body $body -ErrorAction Stop
            Write-Host "HTTP $($resp.StatusCode)"
            $operationId = $resp.Headers['x-ms-operation-id']
            $retryAfterRaw = $resp.Headers['Retry-After']
            $locationUrlRaw = $resp.Headers['Location']
            # Handle headers that may be arrays
            $retryAfter = if ($retryAfterRaw -is [array]) { $retryAfterRaw[0] } else { $retryAfterRaw }
            $locationUrl = if ($locationUrlRaw -is [array]) { $locationUrlRaw[0] } else { $locationUrlRaw }
            Write-Host "x-ms-operation-id: $operationId"
            Write-Host "Retry-After: $retryAfter"
            Write-Host "Location: $locationUrl"

            # Poll for deployment completion
            if ($locationUrl) {
              Log "Polling deployment status..."
              $maxAttempts = 60
              $attempt = 0
              $sleepSeconds = if ($retryAfter) { [int]$retryAfter } else { 10 }
              
              while ($attempt -lt $maxAttempts) {
                Start-Sleep -Seconds $sleepSeconds
                $attempt++
                
                $statusResp = Invoke-AzRestJson -Method GET -Uri $locationUrl
                if ($statusResp.ExitCode -eq 0 -and $statusResp.OutJson) {
                  $status = ($statusResp.OutJson | ConvertFrom-Json)
                  Log "Deployment status: $($status.status) (attempt $attempt/$maxAttempts)"
                  
                  if ($status.status -eq 'Succeeded') {
                    Log "✓ Deployment completed successfully!"
                    break
                  }
                  elseif ($status.status -eq 'Failed') {
                    $statusResp.OutJson | Out-Host
                    Fail "Deployment failed. Check the operation details above."
                  }
                }
                else {
                  Log "Waiting for deployment to complete..."
                }
              }
              
              if ($attempt -ge $maxAttempts) {
                Fail "Deployment polling timed out after $maxAttempts attempts."
              }
            }
          }
          catch {
            $errorDetails = $_.ErrorDetails.Message
            $exMessage = $_.Exception.Message
            
            # Check for "NoItemsToDeploy" in either the error details or exception message
            if (($errorDetails -like '*NoItemsToDeploy*') -or ($exMessage -like '*NoItemsToDeploy*')) {
                 Write-Host "::warning::Deployment skipped: Source and Target stages are already in sync (no changes to deploy)."
                 exit 0
            }
            
            # For other errors, print details if available
            if ($errorDetails) {
                Write-Error "API Error: $errorDetails"
            } else {
                Write-Error "Error: $exMessage"
            }

            throw $_
          }

  production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: test
    environment: PowerBI-Production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (service principal)
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS }}

      - name: "PowerBI deploy: Test → Production (PowerShell)"
        shell: pwsh
        run: |
          # ============================================================================
          # Script: Deploy from Test to Production
          # Purpose: Promotes PowerBI artifacts from Test stage to Production stage using
          #          PowerBI Deployment Pipeline API with status polling
          # ============================================================================
          
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'

          # Helper functions for logging and error handling
          function Log([string]$m){ Write-Host "[$(Get-Date -Format o)] $m" }
          function Fail([string]$m){ Write-Error $m; exit 1 }

          # Acquire access token for Fabric API
          $fabricResource = "${{ env.FABRIC_RESOURCE }}"
          $token = az account get-access-token --resource $fabricResource --query accessToken -o tsv 2>&1
          if ([string]::IsNullOrWhiteSpace($token)){ Fail "Failed to acquire Fabric token." }

          # Helper function to invoke Fabric REST API using Azure CLI
          function Invoke-AzRestJson([string]$Method,[string]$Uri,[string]$BodyJson){
            $headers = @("Authorization=Bearer $token","Content-Type=application/json")
            $cliArgs = @('rest', '--method', $Method, '--uri', $Uri, '--headers') + $headers
            if ($BodyJson){ $tmp = New-TemporaryFile; $BodyJson | Out-File -Encoding utf8 -FilePath $tmp; $cliArgs += @('--body', "@$tmp") }

            $psi = New-Object System.Diagnostics.ProcessStartInfo
            $psi.FileName = "az"
            $psi.RedirectStandardError = $true
            $psi.RedirectStandardOutput = $true
            $psi.UseShellExecute = $false
            foreach ($arg in $cliArgs) { $psi.ArgumentList.Add($arg) }

            $p = [System.Diagnostics.Process]::Start($psi)
            $out = $p.StandardOutput.ReadToEnd()
            $err = $p.StandardError.ReadToEnd()
            $p.WaitForExit()

            $status = ($err -split "`n" | Select-String -Pattern 'Status Code:\s*(\d+)' | ForEach-Object { $_.Matches[0].Groups[1].Value } | Select-Object -Last 1)
            [pscustomobject]@{ Status=$status; ExitCode=$p.ExitCode; OutJson=$out; ErrText=$err }
          }

          # Discover pipeline and stage IDs
          Log "Discovering PowerBI pipeline and stage IDs..."
          $r = Invoke-AzRestJson -Method GET -Uri "$fabricResource/v1/deploymentPipelines"
          if ($r.ExitCode -ne 0){ $r.ErrText | Out-Host; Fail "Failed listing pipelines" }
          $pipelines = ($r.OutJson | ConvertFrom-Json).value

          $pipelineName = "${{ env.POWERBI_PIPELINE_NAME }}"
          $pipeline = $pipelines | Where-Object { $_.displayName -eq $pipelineName } | Select-Object -First 1
          if (-not $pipeline){ Fail "Pipeline '$pipelineName' not found" }
          $pipelineId = $pipeline.id

          $r2 = Invoke-AzRestJson -Method GET -Uri "$fabricResource/v1/deploymentPipelines/$pipelineId/stages"
          if ($r2.ExitCode -ne 0){ $r2.ErrText | Out-Host; Fail "Failed listing stages" }
          $stages = ($r2.OutJson | ConvertFrom-Json).value

          $testId = ($stages | Where-Object { $_.displayName -eq "${{ env.TEST_STAGE_NAME }}" } | Select-Object -ExpandProperty id -First 1)
          $prodId = ($stages | Where-Object { $_.displayName -eq "${{ env.PROD_STAGE_NAME }}" } | Select-Object -ExpandProperty id -First 1)

          if (-not $testId -or -not $prodId){ Fail "Could not resolve source/target stage IDs" }
          Log "Pipeline: $pipelineId, Test: $testId, Prod: $prodId"

          # Build deployment request (All or Selective)
          $deployUri = "$fabricResource/v1/deploymentPipelines/$pipelineId/deploy"
          $deployScope = '${{ inputs.deploy_scope }}'

          if ($deployScope -eq 'Selective') {
            $itemNamesInput = '${{ inputs.item_names }}'
            $includeDependents = '${{ inputs.include_dependents }}' -eq 'true'

            if ([string]::IsNullOrWhiteSpace($itemNamesInput)) {
              Fail "Selective deployment requires at least one item name in 'item_names' input."
            }

            # List items in the source (Test) stage
            Log "Listing items in Test stage..."
            $itemsResp = Invoke-AzRestJson -Method GET -Uri "$fabricResource/v1/deploymentPipelines/$pipelineId/stages/$testId/items"
            if ($itemsResp.ExitCode -ne 0){ $itemsResp.ErrText | Out-Host; Fail "Failed to list stage items" }
            $stageItems = ($itemsResp.OutJson | ConvertFrom-Json).value

            Log "Available items in stage ($($stageItems.Count)):"
            $stageItems | ForEach-Object { Log "  - $($_.itemDisplayName) ($($_.itemType))" }

            # Parse requested names (comma-separated, supports wildcards)
            $requestedNames = $itemNamesInput -split ',' | ForEach-Object { $_.Trim() } | Where-Object { $_ }

            # Match items by display name (wildcard support via -like)
            $matchedItems = @($stageItems | Where-Object {
              $item = $_
              $requestedNames | Where-Object { $item.itemDisplayName -like $_ }
            })

            if ($matchedItems.Count -eq 0) {
              Fail "No items matched the provided names: $itemNamesInput"
            }

            # Optionally include dependent/related items
            if ($includeDependents) {
              $matchedIds = [System.Collections.Generic.HashSet[string]]::new()
              $matchedItems | ForEach-Object { $matchedIds.Add($_.itemId) | Out-Null }
              $selectedTypes = $matchedItems | Select-Object -ExpandProperty itemType -Unique
              $dependentItems = @()

              if ($selectedTypes -contains 'Report') {
                $dependentItems += @($stageItems | Where-Object { $_.itemType -eq 'SemanticModel' -and -not $matchedIds.Contains($_.itemId) })
              }
              if ($selectedTypes -contains 'Dashboard') {
                $dependentItems += @($stageItems | Where-Object { $_.itemType -in @('Report','SemanticModel') -and -not $matchedIds.Contains($_.itemId) })
              }
              if ($selectedTypes -contains 'SemanticModel') {
                $dependentItems += @($stageItems | Where-Object { $_.itemType -in @('Lakehouse','SQLDatabase','Warehouse') -and -not $matchedIds.Contains($_.itemId) })
              }

              if ($dependentItems.Count -gt 0) {
                $dependentItems = $dependentItems | Sort-Object -Property itemId -Unique
                Log "Including $($dependentItems.Count) dependent item(s):"
                $dependentItems | ForEach-Object { Log "  + $($_.itemDisplayName) ($($_.itemType))" }
                $matchedItems = @($matchedItems) + @($dependentItems)
              }
            }

            Log "Deploying $($matchedItems.Count) item(s):"
            $matchedItems | ForEach-Object { Log "  -> $($_.itemDisplayName) ($($_.itemType))" }

            $deployItems = @($matchedItems | ForEach-Object {
              @{ sourceItemId = $_.itemId; itemType = $_.itemType }
            })

            $body = @{
              sourceStageId = $testId
              targetStageId = $prodId
              items         = $deployItems
              note          = "GH Test->Prod (selective)"
            } | ConvertTo-Json -Depth 5
          }
          else {
            $body = @{
              sourceStageId = $testId
              targetStageId = $prodId
              note          = "GH Test->Prod"
            } | ConvertTo-Json -Depth 5
          }

          try {
            $resp = Invoke-WebRequest -Method Post -Uri $deployUri -Headers @{ Authorization = "Bearer $token"; 'Content-Type'='application/json'} -Body $body -ErrorAction Stop
            Write-Host "HTTP $($resp.StatusCode)"
            $operationId = $resp.Headers['x-ms-operation-id']
            $retryAfterRaw = $resp.Headers['Retry-After']
            $locationUrlRaw = $resp.Headers['Location']
            # Handle headers that may be arrays
            $retryAfter = if ($retryAfterRaw -is [array]) { $retryAfterRaw[0] } else { $retryAfterRaw }
            $locationUrl = if ($locationUrlRaw -is [array]) { $locationUrlRaw[0] } else { $locationUrlRaw }
            Write-Host "x-ms-operation-id: $operationId"
            Write-Host "Retry-After: $retryAfter"
            Write-Host "Location: $locationUrl"

            # Poll for deployment completion
            if ($locationUrl) {
              Log "Polling deployment status..."
              $maxAttempts = 60
              $attempt = 0
              $sleepSeconds = if ($retryAfter) { [int]$retryAfter } else { 10 }
              
              while ($attempt -lt $maxAttempts) {
                Start-Sleep -Seconds $sleepSeconds
                $attempt++
                
                $statusResp = Invoke-AzRestJson -Method GET -Uri $locationUrl
                if ($statusResp.ExitCode -eq 0 -and $statusResp.OutJson) {
                  $status = ($statusResp.OutJson | ConvertFrom-Json)
                  Log "Deployment status: $($status.status) (attempt $attempt/$maxAttempts)"
                  
                  if ($status.status -eq 'Succeeded') {
                    Log "✓ Deployment completed successfully!"
                    break
                  }
                  elseif ($status.status -eq 'Failed') {
                    $statusResp.OutJson | Out-Host
                    Fail "Deployment failed. Check the operation details above."
                  }
                }
                else {
                  Log "Waiting for deployment to complete..."
                }
              }
              
              if ($attempt -ge $maxAttempts) {
                Fail "Deployment polling timed out after $maxAttempts attempts."
              }
            }
          }
          catch {
            $errorDetails = $_.ErrorDetails.Message
            $exMessage = $_.Exception.Message
            
            # Check for "NoItemsToDeploy" in either the error details or exception message
            if (($errorDetails -like '*NoItemsToDeploy*') -or ($exMessage -like '*NoItemsToDeploy*')) {
                 Write-Host "::warning::Deployment skipped: Source and Target stages are already in sync (no changes to deploy)."
                 exit 0
            }
            
            # For other errors, print details if available
            if ($errorDetails) {
                Write-Error "API Error: $errorDetails"
            } else {
                Write-Error "Error: $exMessage"
            }

            throw $_
          }